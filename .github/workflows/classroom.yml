name: Autograding Tests

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  checks: write
  actions: read
  contents: read

jobs:
  run-autograding-tests:
    runs-on: ubuntu-latest
    if: github.actor != 'github-classroom[bot]'
    timeout-minutes: 5
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install jupyter nbconvert pytest

    - name: notebookexecutiontest
      id: notebookexecutiontest
      uses: classroom-resources/autograding-command-grader@v1
      with:
        test-name: "Notebook Execution Test"
        setup-command: python -c "import cv2; import numpy as np; cv2.imwrite('test_image.png', np.ones((100, 100, 3), dtype=np.uint8) * 255)"
        command: jupyter nbconvert --to notebook --execute notebook.ipynb --stdout
        timeout: 60
        max-score: 100

    - name: Autograding Reporter
      uses: classroom-resources/autograding-grading-reporter@v1
      env:
        NOTEBOOKEXECUTIONTEST_RESULTS: "${{steps.notebookexecutiontest.outputs.result}}"
      with:
        runners: notebookexecutiontest
